<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ôn tập Trắc nghiệm</title>
    <style>
      /* --- CSS GIAO DIỆN --- */
      :root {
        --primary-color: #4a90e2;
        --secondary-color: #6c757d;
        --success-color: #28a745;
        --danger-color: #dc3545;
        --bg-color: #f0f2f5;
        --card-bg: #ffffff;
      }

      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }

      .quiz-container {
        background-color: var(--card-bg);
        width: 100%;
        max-width: 650px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        padding: 30px;
        display: flex;
        flex-direction: column;
      }

      .header {
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* --- [MỚI] Style cho bộ nhập trang --- */
      .progress-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        color: #777;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      #page-input {
        width: 50px;
        padding: 4px;
        text-align: center;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-weight: bold;
        color: var(--primary-color);
        font-size: 1rem;
        outline: none;
      }

      #page-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
      }

      /* Ẩn mũi tên tăng giảm mặc định của input number */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      /* --- HẾT PHẦN MỚI --- */

      #question-text {
        font-size: 1.3rem;
        color: #333;
        margin: 0 0 25px 0;
        line-height: 1.6;
        font-weight: 600;
      }

      .options-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option-btn {
        background-color: #fff;
        border: 2px solid #e9ecef;
        border-radius: 10px;
        color: #495057;
        padding: 15px 20px;
        text-align: left;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s ease;
        outline: none;
      }

      .option-btn:hover {
        background-color: #f8f9fa;
        border-color: #ced4da;
        transform: translateY(-2px);
      }

      .option-btn.correct {
        background-color: #d4edda;
        border-color: var(--success-color);
        color: #155724;
        font-weight: 500;
      }

      .option-btn.wrong {
        background-color: #f8d7da;
        border-color: var(--danger-color);
        color: #721c24;
        opacity: 0.8;
      }

      .footer {
        margin-top: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 20px;
        border-top: 1px solid #eee;
      }

      .nav-btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        min-width: 120px;
      }

      .nav-btn:active {
        transform: scale(0.95);
      }

      #prev-btn {
        background-color: #e2e6ea;
        color: #495057;
      }

      #prev-btn:hover {
        background-color: #dbe0e5;
      }

      #next-btn {
        background-color: var(--primary-color);
        color: white;
      }

      #next-btn:hover {
        background-color: #357abd;
      }

      .btn-active-key {
        opacity: 0.7;
        transform: scale(0.95);
      }

      .warning {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        color: #6c757d;
        font-size: small;
        margin-top: 30px;
        margin-bottom: -15px;
      }
    </style>
  </head>
  <body>
    <div class="quiz-container">
      <!-- Header đã sửa đổi thành Input -->
      <div class="header">
        <div class="progress-wrapper">
          <span>CÂU HỎI</span>
          <!-- Input nhập số câu -->
          <input type="number" id="page-input" min="1" value="1" />
          <span id="total-count">/ ...</span>
        </div>
      </div>

      <h2 id="question-text">Vui lòng chờ...</h2>
      <div class="options-list" id="options-container"></div>

      <div class="footer">
        <button id="prev-btn" class="nav-btn">← Quay lại</button>
        <button id="next-btn" class="nav-btn" title="Phím tắt: Mũi tên phải">
          Câu tiếp →
        </button>
      </div>
      <div class="warning">Câu trả lời có thể sai, chúng tôi đếch chịu trách nhiệm cho điểm số của bạn</div>
    </div>

    <script>
      let quizData = [];
      let currentQuestionIndex = 0;

      const questionTextEl = document.getElementById("question-text");
      const optionsContainer = document.getElementById("options-container");
      const nextBtn = document.getElementById("next-btn");
      const prevBtn = document.getElementById("prev-btn");

      // Element mới cho phần nhập trang
      const pageInput = document.getElementById("page-input");
      const totalCountEl = document.getElementById("total-count");

      // --- SỰ KIỆN NÚT BẤM CHUỘT ---
      prevBtn.addEventListener("click", () => changeQuestion(-1));
      nextBtn.addEventListener("click", () => changeQuestion(1));

      // --- SỰ KIỆN BÀN PHÍM (ĐIỀU HƯỚNG) ---
      document.addEventListener("keydown", (event) => {
        // Nếu đang gõ trong ô input thì không bắt phím điều hướng (để tránh lỗi khi user dùng mũi tên để sửa số)
        if (document.activeElement === pageInput) return;

        if (quizData.length === 0) return;

        if (event.key === "ArrowRight") {
          triggerButtonEffect(nextBtn);
          changeQuestion(1);
        } else if (event.key === "ArrowLeft") {
          if (currentQuestionIndex > 0) {
            triggerButtonEffect(prevBtn);
            changeQuestion(-1);
          }
        }
      });

      // --- [MỚI] SỰ KIỆN NHẬP SỐ TRANG ---
      // 1. Bắt sự kiện Enter khi đang ở trong ô input
      pageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          jumpToQuestion();
          pageInput.blur(); // Bỏ focus để trả lại quyền điều khiển cho phím mũi tên
        }
      });

      // 2. Bắt sự kiện khi người dùng click ra ngoài ô input (nếu muốn)
      pageInput.addEventListener("change", jumpToQuestion);

      function jumpToQuestion() {
        const pageNum = parseInt(pageInput.value);
        if (isNaN(pageNum)) return; // Nếu không phải số thì thôi

        // Kiểm tra số có hợp lệ không (từ 1 đến tổng số câu)
        if (pageNum >= 1 && pageNum <= quizData.length) {
          currentQuestionIndex = pageNum - 1; // Mảng bắt đầu từ 0
          loadQuiz();
        } else {
          // Nếu nhập số tào lao (vd: 500/300), reset lại số hiện tại
          pageInput.value = currentQuestionIndex + 1;
          alert(`Vui lòng nhập số từ 1 đến ${quizData.length}`);
        }
      }

      function triggerButtonEffect(btnElement) {
        btnElement.classList.add("btn-active-key");
        setTimeout(() => {
          btnElement.classList.remove("btn-active-key");
        }, 150);
      }

      fetch("./data.json")
        .then((res) => {
          if (!res.ok) throw new Error("Không tìm thấy file data.json");
          return res.json();
        })
        .then((data) => {
          quizData = data;
          // Cập nhật tổng số câu ngay khi tải xong
          totalCountEl.innerText = `/ ${quizData.length}`;
          pageInput.max = quizData.length;

          loadQuiz();
        })
        .catch((err) => {
          console.error(err);
          questionTextEl.innerText = "Lỗi: Không thể tải dữ liệu câu hỏi.";
        });

      function loadQuiz() {
        resetState();
        const currentQuizData = quizData[currentQuestionIndex];

        // [MỚI] Cập nhật giá trị trong ô input thay vì thẻ span cũ
        pageInput.value = currentQuestionIndex + 1;

        questionTextEl.innerText = currentQuizData.question;

        ["A", "B", "C", "D"].forEach((key) => {
          if (currentQuizData[key]) {
            const button = document.createElement("button");
            button.innerText = `${key}. ${currentQuizData[key]}`;
            button.classList.add("option-btn");
            button.addEventListener("click", () =>
              checkAnswer(button, key, currentQuizData.answer)
            );
            optionsContainer.appendChild(button);
          }
        });

        updateNavButtons();
      }

      function checkAnswer(selectedButton, selectedKey, correctKey) {
        const allButtons = optionsContainer.querySelectorAll(".option-btn");
        if (selectedKey === correctKey) {
          selectedButton.classList.add("correct");
        } else {
          selectedButton.classList.add("wrong");
          allButtons.forEach((btn) => {
            if (btn.innerText.startsWith(`${correctKey}.`)) {
              btn.classList.add("correct");
            }
          });
        }
      }

      function resetState() {
        while (optionsContainer.firstChild) {
          optionsContainer.removeChild(optionsContainer.firstChild);
        }
      }

      function changeQuestion(direction) {
        const newIndex = currentQuestionIndex + direction;

        if (newIndex >= quizData.length) {
          currentQuestionIndex = 0;
          loadQuiz();
          return;
        }

        if (newIndex >= 0 && newIndex < quizData.length) {
          currentQuestionIndex = newIndex;
          loadQuiz();
        }
      }

      function updateNavButtons() {
        if (currentQuestionIndex === 0) {
          prevBtn.style.visibility = "hidden";
        } else {
          prevBtn.style.visibility = "visible";
        }

        if (currentQuestionIndex === quizData.length - 1) {
          nextBtn.innerText = "Về đầu ↻";
        } else {
          nextBtn.innerText = "Câu tiếp →";
        }
      }
    </script>
  </body>
</html>
